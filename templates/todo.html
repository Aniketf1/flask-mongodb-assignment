<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>

    <h2>Create To-Do Item</h2>

    {% if message %}
        <p style="color:green;">{{ message }}</p>
    {% endif %}

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="/submittodoitem" method="POST">

        <label>Item Name</label><br>
        <input type="text" name="itemName" required><br><br>

        <label>Item Description</label><br>
        <textarea name="itemDesc" rows="4" cols="40" required></textarea><br><br>

        <label>Item ID</label><br>
        <input type="text" name="itemId" required><br><br>
        

        <button type="submit">Submit</button>

    </form>

</body>
</html>
